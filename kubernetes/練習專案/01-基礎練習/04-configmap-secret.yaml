# 練習 4：ConfigMap 和 Secret
# 目標：理解如何管理配置和敏感信息

---
# ConfigMap：存儲非敏感配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # 簡單鍵值對
  app.env: "production"
  log.level: "info"

  # 配置文件
  app.properties: |
    database.host=mysql-service
    database.port=3306
    cache.enabled=true
    cache.ttl=3600

---
# Secret：存儲敏感信息（base64 編碼）
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  # echo -n 'admin' | base64
  username: YWRtaW4=
  # echo -n 'P@ssw0rd123' | base64
  password: UEBzc3cwcmQxMjM=

---
# 使用 ConfigMap 和 Secret 的 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: nginx:1.24

        # 方法 1：通過環境變數使用 ConfigMap
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: app.env
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log.level

        # 方法 2：通過環境變數使用 Secret
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: password

        # 方法 3：掛載 ConfigMap 為文件
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        - name: secret-volume
          mountPath: /etc/secret
          readOnly: true

      volumes:
      - name: config-volume
        configMap:
          name: app-config
      - name: secret-volume
        secret:
          secretName: app-secret

---
# 使用方式：
# 1. 創建 ConfigMap 和 Secret
#    kubectl apply -f 04-configmap-secret.yaml
#
# 2. 查看 ConfigMap
#    kubectl get configmap
#    kubectl describe configmap app-config
#    kubectl get configmap app-config -o yaml
#
# 3. 查看 Secret
#    kubectl get secret
#    kubectl describe secret app-secret
#    kubectl get secret app-secret -o yaml
#
# 4. 從命令行創建 ConfigMap
#    kubectl create configmap my-config --from-literal=key1=value1 --from-literal=key2=value2
#    kubectl create configmap app-config-file --from-file=config.txt
#
# 5. 從命令行創建 Secret
#    kubectl create secret generic my-secret --from-literal=username=admin --from-literal=password=secret
#
# 6. 解碼 Secret
#    kubectl get secret app-secret -o jsonpath='{.data.username}' | base64 -d
#    kubectl get secret app-secret -o jsonpath='{.data.password}' | base64 -d
#
# 7. 進入 Pod 查看配置
#    kubectl exec -it <pod-name> -- sh
#    # 查看環境變數
#    env | grep -E 'APP_ENV|LOG_LEVEL|DB_'
#    # 查看掛載的配置文件
#    ls /etc/config
#    cat /etc/config/app.properties
#    ls /etc/secret
#    cat /etc/secret/username
#
# 8. 更新 ConfigMap（更新後 Pod 需要重啟才能生效）
#    kubectl edit configmap app-config
#    kubectl rollout restart deployment app-with-config
#
# 9. 刪除資源
#    kubectl delete -f 04-configmap-secret.yaml
