# 練習 3：創建 Service
# 目標：理解 Service 如何暴露應用和實現負載均衡

# 首先需要有 Deployment（使用 02-deployment.yaml 創建）

---
# Service 類型 1：ClusterIP（集群內部訪問）
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-clusterip
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80          # Service 端口
    targetPort: 80    # 容器端口

---
# Service 類型 2：NodePort（通過節點端口訪問）
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-nodeport
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080   # 節點端口（範圍：30000-32767）

---
# 使用方式：
# 前置條件：確保已創建 nginx-deployment
#    kubectl apply -f 02-deployment.yaml
#
# 1. 創建 Service
#    kubectl apply -f 03-service.yaml
#
# 2. 查看 Service
#    kubectl get services
#    kubectl get svc
#
# 3. 查看 Service 詳細資訊
#    kubectl describe svc nginx-service-clusterip
#
# 4. 查看 Endpoints（Service 關聯的 Pod IP）
#    kubectl get endpoints nginx-service-clusterip
#
# 5. 測試 ClusterIP Service（在集群內測試）
#    kubectl run test-pod --image=busybox --rm -it --restart=Never -- sh
#    # 在 Pod 內執行：
#    wget -O- http://nginx-service-clusterip
#
# 6. 測試 NodePort Service（從本地訪問）
#    # 獲取 Minikube IP（如果使用 Minikube）
#    minikube ip
#    # 訪問 http://<minikube-ip>:30080
#    # 或使用 localhost:30080（Docker Desktop）
#
# 7. 測試負載均衡（多次請求會分發到不同 Pod）
#    for i in {1..10}; do curl http://localhost:30080; done
#
# 8. 刪除 Service
#    kubectl delete svc nginx-service-clusterip nginx-service-nodeport
